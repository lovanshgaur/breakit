<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
    <link rel="stylesheet" href="../global.css">
    <style>
        .counter{
            border-radius: 1rem;
            width: 380px;
            height: 240px;
            font-size: 4.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rosybrown;
        }
        .controls{
            width: 380px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }
        .control-btn{
            background: #7b3b4b;
            color: #a8bbbf;
            font-weight: 900;
            border-radius: 1rem;
            width: 50%;
            height: 100%;
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="counter"></div>
        <div class="controls">
            <button class="control-btn" id="increment">+</button>
            <button class="control-btn" id="reset">=</button>
            <button class="control-btn" id="decrement">-</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
